<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kulturo — Votre journal culturel personnel. Suivez vos jeux, films et livres." />
  <title>Kulturo</title>

  <!-- Favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       Point de montage de l'application.
       Tout le HTML est injecté dynamiquement par app.js.
       ═══════════════════════════════════════════════════════ -->
  <div id="app">
    <!-- État de chargement initial -->
    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      flex-direction:column;
      gap:1rem;
      color:#a0a0b0;
      font-family:'DM Sans',system-ui,sans-serif;
    ">
      <div class="spinner"></div>
      <span style="font-size:.875rem">Chargement…</span>
    </div>
  </div>

  <!-- ── Configuration (à copier depuis config.example.js) ── -->
  <!--
    INSTRUCTIONS :
    1. Copiez config.example.js → config.js
    2. Remplissez vos clés Supabase et APIs
    3. config.js est ignoré par .gitignore

    Pour un usage rapide sans compte, laissez les valeurs
    par défaut et l'app démarrera en mode démo.
  -->
  <script src="config.js" defer></script>

  <!-- ── Application (modules ES) ───────────────────────────── -->
  <script type="module">
    async function waitForConfig(retries = 20) {
      if (typeof CONFIG !== "undefined") {
        await import("./app.js");
        return;
      }
      if (retries <= 0) { console.error("config.js non chargé"); return; }
      setTimeout(() => waitForConfig(retries - 1), 50);
    }
    waitForConfig();
  </script>

</body>
</html>
